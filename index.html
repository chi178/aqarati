<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root { 
        --primary: #1a7f37; 
        --bg: #f8fafc; 
        --text: #1e293b; 
        --white: #ffffff;
        --radius: 16px; 
    }
    *{margin:0;padding:0;box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif;}
    body{background:linear-gradient(rgba(248, 250, 252, 0.9), rgba(248, 250, 252, 0.9)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; color:var(--text); line-height: 1.6;}

    /* Splash Screen */
    #splash{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary),#0e4e20);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
    .spe{font-size:64px;margin-bottom:16px;color:#fff;animation:bo 1s infinite alternate}
    .sph{color:#fff;font-size:28px;font-weight:800;margin-bottom:6px}
    .spp{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:40px}
    .ld{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}

    /* Pages & Header */
    .page{display:none;min-height:100vh;padding-bottom:100px}
    .page.active{display:block}
    
    header{background:rgba(255,255,255,0.95); backdrop-filter: blur(10px); color:var(--text); position:sticky; top:0; z-index:100; padding:15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
    .sb{background:#f1f5f9; border-radius:12px; padding:12px; display:flex; align-items:center; gap:10px; margin-top:10px;}
    .sb input{flex:1; background:transparent; border:none; outline:none; font-size:14px;}

    /* Navigation */
    #nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:10px;gap:5px;box-shadow: 0 -4px 10px rgba(0,0,0,0.03)}
    .nb{flex:1;background:transparent;color:#64748b;border:none;padding:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;transition:0.3s}
    .nb.on{color:var(--primary); font-weight:700;}

    /* Cards */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px}
    .card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,0.05);transition:0.3s}
    .card:hover{transform:translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1)}
    .cimg{height:160px; background: #e2e8f0; display:flex; align-items:center; justify-content:center; font-size:40px; position:relative;}
    .cbody{padding:16px}
    .cprice{font-size:18px; font-weight:800; color:var(--primary); margin-top:8px;}

    /* Animations */
    @keyframes sp{to{transform:rotate(360deg)}}
    @keyframes bo{from{transform:translateY(0)}to{transform:translateY(-10px)}}
</style>
</head>
<body>

<div id="splash">
  <div class="spe"><i class="fas fa-building"></i></div>
  <h1 class="sph">عقاراتي</h1>
  <p class="spp">المنصة العصرية للعقارات</p>
  <div class="ld"></div>
</div>

<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
     <div style="font-weight:900; font-size:20px; color:var(--primary)"><i class="fas fa-home"></i> عقاراتي</div>
     <div id="lang-btns">
         <button class="hb" onclick="setLang('ar')">ع</button>
     </div>
  </div>
  <div class="sb">
    <i class="fas fa-search" style="color:#94a3b8"></i>
    <input type="text" placeholder="ابحث عن عقارك..." oninput="filterProps()"/>
  </div>
</header>

<div id="nav">
  <button class="nb on" onclick="navGo('browse')"><i class="fas fa-home" style="font-size:18px"></i> تصفح</button>
  <button class="nb" onclick="navGo('post')"><i class="fas fa-plus-circle" style="font-size:18px"></i> أضف</button>
  <button class="nb" onclick="navGo('favs')"><i class="fas fa-heart" style="font-size:18px"></i> المفضلة</button>
  <button class="nb" onclick="navGo('cfg')"><i class="fas fa-cog" style="font-size:18px"></i> إعدادات</button>
</div>

<div id="content-area">
    </div>

<script>
    // ضع كود JavaScript الخاص بك هنا
</script>

</body>
</html>
