<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- ═══ PWA Essential ═══ -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#116329" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- ═══ Apple / iOS ═══ -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="عقاراتي" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-144.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />

  <!-- ═══ Apple Splash Screens ═══ -->
  <meta name="apple-touch-startup-image" href="/icons/icon-512.png" />

  <!-- ═══ SEO & Social ═══ -->
  <title>عقاراتي | منصة العقارات الجزائرية</title>
  <meta name="description" content="منصة العقارات الجزائرية الأولى - ابحث عن شقق وفيلات ومحلات وأراضي في 58 ولاية" />
  <meta name="keywords" content="عقارات الجزائر, شقق للإيجار, فيلات للبيع, immo algérie, aqarati" />
  <meta name="author" content="Aqarati" />

  <!-- Open Graph -->
  <meta property="og:title" content="عقاراتي - منصة العقارات الجزائرية" />
  <meta property="og:description" content="ابحث عن عقارك المثالي في 58 ولاية جزائرية" />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ar_DZ" />

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
  <link rel="shortcut icon" href="/icons/icon-96.png" />

  <!-- ═══ Fonts ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #116329;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* شاشة التحميل */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #116329, #1a7f37);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash .logo { font-size: 72px; margin-bottom: 16px; animation: bounce 1s infinite alternate; }
    #splash h1 { color: #fff; font-size: 32px; font-weight: 900; margin-bottom: 6px; }
    #splash p { color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 40px; }

    .loader {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

    #splash.hidden { opacity: 0; pointer-events: none; }

    /* زر تثبيت PWA */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: #116329;
      color: white;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 1000;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
    }

    #install-banner.show { display: flex; }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #install-banner .icon { font-size: 28px; flex-shrink: 0; }
    #install-banner .text { flex: 1; }
    #install-banner .text strong { display: block; font-size: 14px; font-weight: 700; }
    #install-banner .text span { font-size: 12px; opacity: 0.85; }

    #install-btn {
      background: white;
      color: #116329;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      flex-shrink: 0;
    }

    #close-banner {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    /* iOS install guide */
    #ios-guide {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
      z-index: 1001;
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    #ios-guide.show { display: block; }
    #ios-guide h3 { color: #116329; font-size: 18px; margin-bottom: 6px; }
    #ios-guide p { color: #666; font-size: 13px; margin-bottom: 20px; }

    .ios-steps {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: right;
    }

    .ios-step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f6f8fa;
      border-radius: 12px;
      padding: 12px;
    }

    .ios-step .num {
      width: 30px; height: 30px;
      background: #116329;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .ios-step .desc { font-size: 13px; color: #333; line-height: 1.5; }
    .ios-step .em { font-size: 20px; flex-shrink: 0; }

    #close-ios {
      margin-top: 20px;
      background: #116329;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      width: 100%;
    }

    /* Container للتطبيق */
    #root {
      width: 100%;
      min-height: 100vh;
      background: #f6f8fa;
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="splash">
    <div class="logo">🏘️</div>
    <h1>عقاراتي</h1>
    <p>منصة العقارات الجزائرية الأولى</p>
    <div class="loader"></div>
  </div>

  <!-- بانر التثبيت (Android) -->
  <div id="install-banner">
    <span class="icon">🏘️</span>
    <div class="text">
      <strong>ثبّت تطبيق عقاراتي</strong>
      <span>أضفه لشاشتك الرئيسية مجاناً</span>
    </div>
    <button id="install-btn">تثبيت</button>
    <button id="close-banner">✕</button>
  </div>

  <!-- دليل التثبيت على iOS -->
  <div id="ios-guide">
    <h3>🍎 ثبّت عقاراتي على iPhone</h3>
    <p>اتبع هذه الخطوات البسيطة</p>
    <div class="ios-steps">
      <div class="ios-step">
        <div class="num">1</div>
        <span class="em">⬆️</span>
        <div class="desc">اضغط على زر <strong>المشاركة</strong> في أسفل Safari</div>
      </div>
      <div class="ios-step">
        <div class="num">2</div>
        <span class="em">➕</span>
        <div class="desc">اختر <strong>"إضافة إلى الشاشة الرئيسية"</strong></div>
      </div>
      <div class="ios-step">
        <div class="num">3</div>
        <span class="em">✅</span>
        <div class="desc">اضغط <strong>"إضافة"</strong> في الزاوية اليمنى العليا</div>
      </div>
    </div>
    <button id="close-ios">فهمت، شكراً!</button>
  </div>

  <!-- التطبيق الرئيسي -->
  <div id="root"></div>

  <!-- React و التطبيق -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/aqarati.jsx"></script>

  <script>
    // ══════════════════════════════════
    // تسجيل Service Worker
    // ══════════════════════════════════
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.log('[SW] Error:', err));
      });
    }

    // ══════════════════════════════════
    // إخفاء شاشة التحميل
    // ══════════════════════════════════
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 500);
      }, 1800);
    });

    // ══════════════════════════════════
    // زر تثبيت PWA (Android / Chrome)
    // ══════════════════════════════════
    let deferredPrompt;
    const installBanner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const closeBanner = document.getElementById('close-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // أظهر البانر بعد 3 ثواني
      setTimeout(() => installBanner.classList.add('show'), 3000);
    });

    installBtn.addEventListener('click', async () => {
      installBanner.classList.remove('show');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('[PWA] Install outcome:', outcome);
        deferredPrompt = null;
      }
    });

    closeBanner.addEventListener('click', () => {
      installBanner.classList.remove('show');
    });

    // ══════════════════════════════════
    // دليل التثبيت على iOS / Safari
    // ══════════════════════════════════
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;

    if (isIOS && isSafari && !isStandalone) {
      const iosGuide = document.getElementById('ios-guide');
      // أظهر الدليل بعد 4 ثواني
      setTimeout(() => iosGuide.classList.add('show'), 4000);
      document.getElementById('close-ios').addEventListener('click', () => {
        iosGuide.classList.remove('show');
      });
    }

    // ══════════════════════════════════
    // تحديث تلقائي عند توفر نسخة جديدة
    // ══════════════════════════════════
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
  </script>

</body>
</html>
