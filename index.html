<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#116329"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="عقاراتي"/>
<meta name="description" content="منصة عقاراتي الجزائرية - تصفح، أضف، وابحث عن العقارات بكل سهولة."/>
<title>عقاراتي - منصة العقارات الجزائرية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f6f8fa;color:#1f2328}
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#116329,#1a7f37);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.spe{font-size:72px;margin-bottom:16px;animation:bo 1s infinite alternate}
.sph{color:#fff;font-size:32px;font-weight:900;margin-bottom:6px}
.spp{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:40px}
.ld{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes bo{from{transform:translateY(0)}to{transform:translateY(-10px)}}
/* PAGES */
.page{display:none;min-height:100vh;padding-bottom:80px}
.page.active{display:block}
/* HEADER */
header{background:linear-gradient(135deg,#116329,#1a7f37);color:#fff;position:sticky;top:0;z-index:100;padding:0 14px}
.ht{display:flex;align-items:center;justify-content:space-between;padding:11px 0}
.hb{background:rgba(255,255,255,.1);border:none;border-radius:7px;padding:4px 8px;color:#fff;cursor:pointer;font-size:11px}
.hb.on{background:rgba(255,255,255,.3);font-weight:700}
.hbi{background:rgba(255,255,255,.15);border:none;border-radius:7px;padding:5px 7px;color:#fff;cursor:pointer;font-size:15px}
.sb{background:rgba(255,255,255,.18);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px}
.sb input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;text-align:right}
.sb input::placeholder{color:rgba(255,255,255,.7)}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid #d0d7de;display:flex;padding:6px 8px 10px;gap:4px}
.nb{flex:1;background:transparent;color:#6e7781;border:none;border-radius:10px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px}
.nb.on{background:#116329;color:#fff;font-weight:700}
/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;padding:1rem}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer}
.cimg{height:120px;background:linear-gradient(135deg,#dcfce7,#a7f3d0);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.badge{position:absolute;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;color:#fff;top:8px;right:8px}
.cbody{padding:10px 12px}
.cloc{font-size:10px;color:#6e7781;margin-bottom:2px}
.ctit{font-size:13px;font-weight:700;color:#1f2328;margin:0 0 5px;line-height:1.4}
.cmeta{display:flex;gap:8px;font-size:11px;color:#6e7781;margin-bottom:7px}
.cprice{font-size:14px;font-weight:900;color:#1a7f37}
.favbtn{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px}
/* FILTER */
.fbox{background:#fff;border-radius:14px;padding:10px 12px;margin:12px 12px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tbrow{display:flex;gap:4px;margin-bottom:8px}
.tb{border:none;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;background:#eaeef2;color:#6e7781}
.tb.on{background:#116329;color:#fff;font-weight:700}
select{border:1px solid #d0d7de;border-radius:9px;padding:5px 9px;background:#fff;color:#1f2328;font-size:11px;cursor:pointer;margin-bottom:6px;width:100%}
/* CATS */
.cats{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;scrollbar-width:none}
.cat{flex-shrink:0;border:none;border-radius:20px;padding:6px 13px;cursor:pointer;background:#eaeef2;color:#6e7781;font-size:12px}
.cat.on{background:#116329;color:#fff;font-weight:700}
/* DETAIL */
#detail-page{background:#f6f8fa}
.dimg{height:200px;background:linear-gradient(135deg,#dcfce7,#a7f3d0);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.dback{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.9);border:none;border-radius:10px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:12px;color:#116329}
.dbody{padding:1.2rem}
.dtit{font-size:19px;font-weight:900;color:#1f2328;margin:4px 0 8px}
.ddesc{color:#6e7781;font-size:13px;line-height:1.7}
.dprice{font-size:20px;font-weight:900;color:#1a7f37;margin:8px 0}
.specs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.spec{background:#f0fdf4;border-radius:10px;padding:8px 14px;text-align:center;font-size:12px;color:#1f2328}
.callbtn{display:block;background:#1a7f37;color:#fff;padding:14px;border-radius:12px;text-decoration:none;font-size:15px;font-weight:700;text-align:center;margin:12px 0}
/* POST FORM */
#post-page{padding:1rem}
.pbox{background:#fff;border-radius:16px;padding:1.5rem;max-width:500px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.prow{display:flex;gap:8px;margin-bottom:14px}
.ptbtn{flex:1;border-radius:11px;padding:11px;cursor:pointer;font-size:13px;color:#1f2328;background:#fff;border:2px solid #d0d7de;font-family:inherit}
.ptbtn.on{border-color:#1a7f37;background:#f0fdf4;font-weight:700}
.catgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.catbtn{border-radius:11px;padding:9px 5px;cursor:pointer;background:#fff;color:#1f2328;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid #d0d7de;font-family:inherit}
.catbtn.on{border-color:#1a7f37;background:#f0fdf4;font-weight:700}
label{font-size:12px;color:#6e7781;display:block;margin-bottom:5px;font-weight:600}
input[type=text],input[type=tel],input[type=number],textarea,select.full{width:100%;border:1.5px solid #d0d7de;border-radius:10px;padding:11px 13px;font-size:14px;background:#fff;color:#1f2328;text-align:right;box-sizing:border-box;font-family:inherit;outline:none;margin-bottom:14px}
textarea{resize:none}
input:focus,textarea:focus{border-color:#1a7f37}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.rmbtn{display:flex;gap:5px;margin-bottom:14px}
.rmbtn button{flex:1;border-radius:8px;padding:7px 2px;cursor:pointer;background:#fff;color:#6e7781;font-size:11px;border:1.5px solid #d0d7de;font-family:inherit}
.rmbtn button.on{border-color:#1a7f37;background:#f0fdf4;color:#1a7f37;font-weight:700}
.btnrow{display:flex;gap:8px;margin-top:8px}
.btn-p{background:#1a7f37;color:#fff;border:none;border-radius:11px;padding:13px;font-weight:700;cursor:pointer;font-size:14px;flex:2;font-family:inherit}
.btn-s{border:1.5px solid #1a7f37;background:#fff;color:#1a7f37;border-radius:11px;padding:12px;font-weight:700;cursor:pointer;font-size:13px;flex:1;font-family:inherit}
.steps{display:flex;gap:5px;margin-bottom:1.2rem}
.step{flex:1;height:5px;border-radius:3px;background:#d0d7de}
.step.on{background:#1a7f37}
/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#116329;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* MSG */
.msgbox{background:#f6f8fa;border-radius:14px;padding:1rem;margin-top:12px}
/* CFG PAGE */
#cfg-page{padding:1rem}
.pkg-card{border:2px solid #d0d7de;padding:1.2rem;border-radius:14px;cursor:pointer;background:#fff;margin-bottom:10px}
.pkg-card.selected{border-color:#1a7f37;background:#f0fdf4}
</style>
</head>
<body>

<div id="splash">
  <div class="spe">🏘️</div>
  <h1 class="sph">عقاراتي</h1>
  <p class="spp">منصة العقارات الجزائرية الأولى</p>
  <div class="ld"></div>
</div>

<div id="toast" class="toast"></div>

<header id="main-header">
  <div class="ht">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:24px">🏘️</span>
      <div>
        <div style="font-size:17px;font-weight:900" id="app-name">عقاراتي</div>
        <div style="font-size:10px;opacity:.8" id="app-tag">منصة العقارات الجزائرية الأولى</div>
      </div>
    </div>
    <div style="display:flex;gap:5px;align-items:center">
      <button class="hb on" id="btn-ar" onclick="setLang('ar')">ع</button>
      <button class="hb" id="btn-fr" onclick="setLang('fr')">FR</button>
      <button class="hb" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="sb" id="search-bar">
    <span>🔍</span>
    <input type="text" id="search-inp" placeholder="ابحث..." oninput="filterProps()"/>
  </div>
</header>

<div id="nav">
  <button class="nb on" onclick="navGo('browse')"><span style="font-size:20px">🏠</span><span id="nav-browse">تصفح</span></button>
  <button class="nb" onclick="navGo('post')"><span style="font-size:20px">➕</span><span id="nav-post">أضف</span></button>
  <button class="nb" onclick="navGo('favs')"><span style="font-size:20px">❤️</span><span id="nav-favs">المفضلة</span></button>
  <button class="nb" onclick="navGo('cfg')"><span style="font-size:20px">⚙️</span><span id="nav-cfg">إعدادات</span></button>
</div>

</body>
</html>
