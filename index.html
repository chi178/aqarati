<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عقاراتي</title>
    <style>
        :root {
            --bg-body: #f3f4f6; --bg-card: #ffffff; --text-main: #111827; 
            --primary: #15803d; --border: #e5e7eb;
        }
        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #f9fafb; 
            --primary: #22c55e; --border: #374151;
        }
        body { background: var(--bg-body); color: var(--text-main); font-family: sans-serif; transition: 0.3s; }
        
        /* إخفاء المحتوى قبل الدخول */
        #main-app { display: none; }
        
        /* صفحة التسجيل */
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-body); color: var(--text-main); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* الأيقونات (تم حل مشكلة المربعات) */
        .icon { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
        
        #nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="card">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="user-name" class="input" placeholder="الاسم الكامل">
            <input type="text" id="user-phone" class="input" placeholder="رقم الهاتف">
            <button class="btn" onclick="handleLogin()">دخول للمحتوى</button>
        </div>
    </div>

    <div id="main-app">
        <header style="padding: 20px; font-weight: bold; font-size: 20px;">مرحباً <span id="display-name"></span></header>
        
        <div style="padding: 20px;">
            <button class="btn" onclick="toggleDarkMode()">تغيير الوضع (ليلي/نهاري)</button>
            <div id="admin-panel" style="margin-top: 20px; padding: 15px; border: 2px solid var(--primary); border-radius: 10px; display: none;">
                <h3 style="color: var(--primary);">👑 لوحة المشرف (CHIHEB)</h3>
                <p>صلاحيات التحكم مفعلة لهذا الحساب.</p>
            </div>
        </div>

        <nav id="nav-bar">
            <svg class="icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <svg class="icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path></svg>
            <svg class="icon"><circle cx="12" cy="12" r="3"></circle></svg>
        </nav>
    </div>

    <script>
        // التحقق عند التحميل
        window.onload = () => {
            const user = localStorage.getItem('user_data');
            if (user) {
                showApp(JSON.parse(user));
            }
        };

        function handleLogin() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            
            if(!name || !phone) return alert("يرجى ملء البيانات");

            const userData = { name, phone };
            localStorage.setItem('user_data', JSON.stringify(userData));
            showApp(userData);
        }

        function showApp(user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = user.name;

            // التحقق من صلاحيات المشرف
            if (user.name === 'CHIHEB' && user.phone === '0562109877') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'light') {
                html.setAttribute('data-theme', 'dark');
            } else {
                html.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
