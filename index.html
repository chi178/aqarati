<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#116329"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="عقاراتي"/>
<title>عقاراتي | منصة العقارات الجزائرية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f6f8fa;color:#1f2328}
:root{--ac:#1a7f37;--acd:#116329;--bg:#f6f8fa;--card:#fff;--border:#d0d7de;--sub:#6e7781;--inp:#fff;--pill:#eaeef2;--sh:0 2px 12px rgba(0,0,0,.08)}
.dark{--ac:#3fb950;--acd:#238636;--bg:#0d1117;--card:#161b22;--border:#30363d;--sub:#7d8590;--inp:#21262d;--pill:#21262d;--sh:0 4px 20px rgba(0,0,0,.5)}
body{background:var(--bg);color:var(--card)}
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#116329,#1a7f37);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.sp-logo{font-size:72px;margin-bottom:16px;animation:bo 1s infinite alternate}
.sp-h1{color:#fff;font-size:32px;font-weight:900;margin-bottom:6px}
.sp-p{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:40px}
.loader{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes bo{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.hd{opacity:0!important;pointer-events:none}

/* LAYOUT */
#app{min-height:100vh;background:var(--bg)}
header{background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:640px;margin:0 auto;padding:0 14px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:11px 0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-em{font-size:26px}
.logo-name{font-size:19px;font-weight:900}
.logo-tag{font-size:10px;opacity:.8}
.hdr-btns{display:flex;gap:5px;align-items:center}
.hbtn{background:rgba(255,255,255,.1);border:none;border-radius:7px;padding:4px 8px;color:#fff;cursor:pointer;font-size:11px;font-weight:400}
.hbtn.active{background:rgba(255,255,255,.3);font-weight:700}
.hbtn-icon{background:rgba(255,255,255,.15);border:none;border-radius:7px;padding:5px 7px;color:#fff;cursor:pointer;font-size:15px}
.search-bar{background:rgba(255,255,255,.18);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;text-align:right}
.search-bar input::placeholder{color:rgba(255,255,255,.7)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 8px 10px;gap:4px;max-width:640px;margin:0 auto}
.nav-btn{flex:1;background:transparent;color:var(--sub);border:none;border-radius:10px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:400}
.nav-btn.active{background:var(--acd);color:#fff;font-weight:700}
.nav-em{font-size:20px}

/* MAIN */
main{max-width:640px;margin:0 auto;padding:1rem;padding-bottom:90px}

/* FILTER */
.filter-box{background:var(--card);border-radius:14px;padding:10px 12px;margin-bottom:12px;box-shadow:var(--sh)}
.filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.type-btns{display:flex;gap:4px}
.tbtn{border:none;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;background:var(--pill);color:var(--sub);font-weight:400}
.tbtn.active{background:var(--acd);color:#fff;font-weight:700}
.fsel{border:1px solid var(--border);border-radius:9px;padding:5px 9px;background:var(--inp);color:#1f2328;font-size:11px;cursor:pointer;flex:1;min-width:0}
.price-row{display:flex;gap:8px;margin-top:8px}
.pinp{border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;font-size:11px;background:var(--inp);color:#1f2328;text-align:right;flex:1;outline:none;font-family:inherit}
.rst-btn{background:var(--pill);border:none;border-radius:9px;padding:6px 10px;cursor:pointer;font-size:11px;color:var(--sub)}
.res-count{font-size:11px;color:var(--sub);margin-top:6px}

/* CATS */
.cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.cat-btn{flex-shrink:0;border:none;border-radius:20px;padding:6px 13px;cursor:pointer;background:var(--pill);color:var(--sub);font-size:12px;font-weight:400;display:flex;align-items:center;gap:5px}
.cat-btn.active{background:var(--acd);color:#fff;font-weight:700}

/* FEATURED */
.feat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.feat-card{min-width:170px;background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;flex-shrink:0;box-shadow:var(--sh)}
.feat-img{height:80px;background:linear-gradient(135deg,#dcfce7,#a7f3d0);display:flex;align-items:center;justify-content:center;font-size:34px}
.feat-body{padding:8px 10px}
.feat-title{font-size:11px;font-weight:700;color:#1f2328;margin-bottom:2px;line-height:1.3}
.feat-price{font-size:12px;font-weight:900;color:var(--ac)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .18s}
.card:hover{transform:translateY(-3px)}
.card-img{height:120px;background:linear-gradient(135deg,#dcfce7,#a7f3d0);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.badge{position:absolute;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;color:#fff}
.badge-type{top:8px;right:8px}
.badge-feat{top:8px;left:8px;background:#bf8700}
.fav-btn{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.85);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.fav-btn.active{background:#ef4444}
.card-body{padding:10px 12px}
.card-loc{font-size:10px;color:var(--sub);margin-bottom:2px}
.card-title{margin:0 0 5px;font-size:13px;font-weight:700;color:#1f2328;line-height:1.4}
.card-meta{display:flex;gap:8px;font-size:11px;color:var(--sub);margin-bottom:7px;flex-wrap:wrap}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-price{font-size:14px;font-weight:900;color:var(--ac)}
.badges-row{display:flex;gap:4px}
.badge-sm{font-size:9px;border-radius:10px;padding:2px 7px;font-weight:600}
.badge-neg{background:#dcfce7;color:var(--ac)}
.badge-ok{background:#fff8c5;color:#9a6700}

/* DETAIL */
.detail-img{height:200px;background:linear-gradient(135deg,#dcfce7,#a7f3d0);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.detail-back{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.9);border:none;border-radius:10px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:12px;color:#116329}
.detail-fav{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.detail-fav.active{background:#ef4444}
.detail-body{padding:1.2rem}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.detail-loc{font-size:11px;color:var(--sub);margin-bottom:3px}
.detail-title{margin:0 0 6px;font-size:19px;font-weight:900;color:#1f2328}
.detail-desc{color:var(--sub);font-size:13px;line-height:1.7;margin:0}
.detail-price-wrap{text-align:center}
.detail-type-badge{border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:#fff;margin-bottom:6px;display:inline-block}
.detail-price{font-size:18px;font-weight:900;color:var(--ac)}
.detail-neg{font-size:10px;color:var(--ac);margin-top:2px}
.specs{display:flex;gap:10px;margin:1rem 0;flex-wrap:wrap}
.spec{background:#f6f8fa;border-radius:10px;padding:9px 14px;text-align:center}
.spec-em{font-size:17px}
.spec-lb{font-size:11px;color:var(--sub);margin-top:2px}
.action-row{display:flex;gap:8px;margin-bottom:1rem}
.call-btn{flex:2;background:var(--ac);color:#fff;padding:12px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:700;text-align:center;display:block}
.icon-btn{background:var(--pill);border:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-size:14px;color:#1f2328}
.owner-box{background:#f6f8fa;border-radius:14px;padding:12px;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.owner-av{width:42px;height:42px;background:var(--acd);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.owner-name{font-weight:700;font-size:14px;color:#1f2328}
.owner-lbl{font-size:11px;color:var(--sub)}
.owner-ph{margin-right:auto;font-size:12px;color:var(--sub)}
.msg-box{background:#f6f8fa;border-radius:14px;padding:1rem}
.msg-title{margin:0 0 10px;color:var(--ac);font-size:14px}
.msg-ta{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;background:var(--inp);color:#1f2328;text-align:right;resize:none;font-family:inherit;outline:none;box-sizing:border-box}
.msg-send{margin-top:10px;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;font-size:14px}
.msg-ok{background:#d1fae5;border-radius:14px;padding:1rem;text-align:center;color:#065f46;font-weight:700}

/* POST */
.post-box{background:var(--card);border-radius:20px;padding:1.5rem;box-shadow:var(--sh);max-width:500px;margin:0 auto}
.post-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.post-h2{color:#1f2328;margin:0;font-size:18px}
.post-step{font-size:12px;color:var(--sub)}
.progress{display:flex;gap:5px;margin-bottom:1.4rem}
.prog-bar{flex:1;height:5px;border-radius:3px;background:var(--border);transition:background .3s}
.prog-bar.done{background:var(--ac)}
.form-col{display:flex;flex-direction:column;gap:13px}
label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px;font-weight:600;text-align:right}
.inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;background:var(--inp);color:#1f2328;text-align:right;box-sizing:border-box;font-family:inherit;outline:none}
.sel{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;background:var(--inp);color:#1f2328;box-sizing:border-box;font-family:inherit;outline:none}
.ta{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;background:var(--inp);color:#1f2328;text-align:right;resize:none;box-sizing:border-box;font-family:inherit;outline:none}
.type-row{display:flex;gap:8px}
.type-btn{flex:1;border-radius:11px;padding:11px;font-weight:400;cursor:pointer;font-size:13px;color:#1f2328;background:var(--card);border:2px solid var(--border)}
.type-btn.active{border-color:var(--ac);background:#f0fdf4;font-weight:700}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cat-pick{border-radius:11px;padding:9px 5px;cursor:pointer;background:var(--card);color:#1f2328;font-size:10px;font-weight:400;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid var(--border)}
.cat-pick.active{border-color:var(--ac);background:#f0fdf4;font-weight:700}
.cat-em{font-size:19px}
.rm-row{display:flex;gap:5px}
.rm-btn{flex:1;border-radius:8px;padding:7px 2px;cursor:pointer;background:var(--card);color:var(--sub);font-size:11px;font-weight:400;border:1.5px solid var(--border)}
.rm-btn.active{border-color:var(--ac);background:#f0fdf4;color:var(--ac);font-weight:700}
.two-row{display:flex;gap:10px}
.two-row>div{flex:1}
.btn-row{display:flex;gap:8px}
.btn-primary{background:var(--ac);color:#fff;border:none;border-radius:11px;padding:12px;font-weight:700;cursor:pointer;font-size:14px;flex:2}
.btn-secondary{border:1.5px solid var(--ac);background:var(--card);color:var(--ac);border-radius:11px;padding:12px;font-weight:700;cursor:pointer;font-size:13px;flex:1}
.summary-box{background:#f6f8fa;border-radius:11px;padding:12px;font-size:12px;color:var(--sub);line-height:2;border-right:4px solid var(--ac)}
.summary-title{color:#1f2328;font-weight:700}
.done-box{text-align:center;padding:2rem 0}
.done-em{font-size:60px}
.done-h2{color:var(--ac)}
.done-p{color:var(--sub);font-size:13px}

/* SETTINGS */
.cfg-box{max-width:480px;margin:0 auto}
.profile-card{background:linear-gradient(135deg,var(--acd),var(--ac));border-radius:16px;padding:1.2rem;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:14px}
.profile-av{width:52px;height:52px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.profile-name{font-weight:900;font-size:16px}
.profile-ph{opacity:.8;font-size:12px}
.profile-btn{background:rgba(255,255,255,.2);border:none;border-radius:9px;padding:7px 12px;color:#fff;cursor:pointer;font-size:12px;font-weight:700;margin-right:auto}
.cfg-section{background:var(--card);border-radius:15px;padding:1.2rem;margin-bottom:10px;box-shadow:var(--sh)}
.cfg-label{font-weight:700;margin-bottom:11px;font-size:13px;color:var(--sub)}
.lang-row{display:flex;gap:8px}
.lang-btn{flex:1;border-radius:13px;padding:11px 5px;cursor:pointer;background:var(--card);color:#1f2328;font-weight:400;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px;border:2px solid var(--border)}
.lang-btn.active{border-color:var(--ac);background:#f0fdf4;font-weight:700}
.lang-flag{font-size:22px}
.theme-row{display:flex;gap:8px}
.theme-btn{flex:1;border-radius:13px;padding:11px;cursor:pointer;background:var(--card);color:#1f2328;font-weight:400;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;border:2px solid var(--border)}
.theme-btn.active{border-color:var(--ac);background:#f0fdf4;font-weight:700}
.notif-row{display:flex;justify-content:space-between;align-items:center}
.notif-lbl{font-weight:700;font-size:14px;color:#1f2328}
.notif-sub{font-size:11px;color:var(--sub);margin-top:2px}
.toggle{width:48px;height:26px;border-radius:13px;border:none;background:var(--border);cursor:pointer;position:relative;transition:background .3s}
.toggle.on{background:var(--ac)}
.toggle-dot{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;right:4px;transition:right .3s}
.toggle.on .toggle-dot{right:24px}
.api-row{background:#f6f8fa;border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.api-em{font-size:15px}
.api-name{font-size:11px;font-weight:700;color:#1f2328}
.api-val{font-size:10px;color:var(--sub);font-family:monospace}
.api-badge{font-size:10px;background:#dcfce7;color:var(--ac);border-radius:6px;padding:2px 7px;font-weight:600;margin-right:auto}
.abt-foot{margin-top:10px;font-size:11px;color:var(--sub);line-height:1.9;border-top:1px solid var(--border);padding-top:10px}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--sub)}
.empty-em{font-size:48px}
.sec-title{margin:0 0 10px;font-size:13px;font-weight:700;color:var(--sub)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg)}
.login-box{background:var(--card);border-radius:20px;padding:2rem;width:100%;max-width:360px;box-shadow:var(--sh)}
.login-center{text-align:center;margin-bottom:1.5rem}
.login-em{font-size:48px}
.login-h2{color:var(--ac);margin:8px 0 4px;font-size:20px}
.login-p{color:var(--sub);font-size:13px}
.otp-hint{background:#dcfce7;border-radius:12px;padding:10px;text-align:center;margin-bottom:14px;font-size:13px;color:var(--ac)}
.back-link{width:100%;margin-top:10px;background:transparent;border:none;cursor:pointer;color:var(--sub);font-size:13px;font-family:inherit}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">🏘️</div>
  <h1 class="sp-h1">عقاراتي</h1>
  <p class="sp-p">منصة العقارات الجزائرية الأولى</p>
  <div class="loader"></div>
</div>
<div id="app"></div>
<script>

function getList(){
  const t=T[S.lang];
  return P.filter(p=>{
    if(S.fT!=="all"&&p.type!==S.fT)return false;
    if(S.fW!=="all"&&p.wil!==S.fW)return false;
    if(S.fC!=="all"&&p.cat!==S.fC)return false;
    if(S.minP&&p.price<Number(S.minP))return false;
    if(S.maxP&&p.price>Number(S.maxP))return false;
    if(S.q&&!p.title[S.lang].toLowerCase().includes(S.q.toLowerCase())&&!p.wil.includes(S.q)&&!p.city.includes(S.q))return false;
    return true;
  });

      ${["apartment","villa","commercial","land","office","studio"].map(c=>`<button class="cat-pick${f.cat===c?" active":""}" onclick="setForm('cat','${c}')"><span class="cat-em">${CE[c]}</span>${t[c]}</button>`).join("")}
    </div></div>
    <button class="btn-primary" style="border:none;font-family:inherit" onclick="setState({stp:2})">${t.nxt}</button>
  </div>`:""}
  ${S.stp===2?`<div class="form-col">
    <div><label>${t.wil}</label><select class="sel" onchange="setForm('wil',this.value)"><option value="">${t.selW}</option>${W.map(w=>`<option value="${w}"${f.wil===w?" selected":""}>${w}</option>`).join("")}</select></div>
    <div><label>${t.com}</label><input class="inp" value="${f.com}" oninput="setForm('com',this.value)"/></div>
    <div><label>${t.ttl}</label><input class="inp" value="${f.ttl}" oninput="setForm('ttl',this.value)"/></div>
    <div class="two-row">
      <div><label>${t.pr}</label><input class="inp" type="number" value="${f.pr}" oninput="setForm('pr',this.value)"/></div>
      <div><label>${t.ar2}</label><input class="inp" type="number" value="${f.ar}" oninput="setForm('ar',this.value)"/></div>
    </div>
    <div><label>${t.rm}</label><div class="rm-row">${[0,1,2,3,4,5,6,7].map(n=>`<button class="rm-btn${f.rm===n?" active":""}" onclick="setForm('rm',${n})">${n===0?"—":n===7?"7+":n}</button>`).join("")}</div></div>
    <div class="btn-row"><button class="btn-secondary" onclick="setState({stp:1})">${t.prv}</button><button class="btn-primary" style="border:none;font-family:inherit" onclick="if(S.form.wil&&S.form.ttl)setState({stp:3})">${t.nxt}</button></div>
  </div>`:""}
  ${S.stp===3?`<div class="form-col">
    <div><label>${t.dsc}</label><textarea class="ta" rows="4" oninput="setForm('dsc',this.value)">${f.dsc}</textarea></div>
    <div><label>${t.ph}</label><input class="inp" value="${f.ph}" oninput="setForm('ph',this.value)"/></div>
    <div class="summary-box"><div class="summary-title">${CE[f.cat]} ${f.ttl||"—"}</div><div>📍 ${f.wil||"—"}${f.com?" · "+f.com:""}</div><div>💰 ${f.pr?Number(f.pr).toLocaleString("fr-DZ")+" "+t.pu+(f.type==="rent"?t.pm:""):"—"}</div></div>
    <div class="btn-row"><button class="btn-secondary" onclick="setState({stp:2})">${t.prv}</button><button class="btn-primary" style="border:none;font-family:inherit" onclick="if(S.form.ph)setState({done:true})">${t.pub}</button></div>
  </div>`:""}
  </div></div>`;
}

function renderFavs(){
  const t=T[S.lang];
  const list=P.filter(p=>S.favs.includes(p.id));
  return`<div style="max-width:640px;margin:0 auto;padding:1rem;padding-bottom:90px">
  <h2 style="margin:0 0 1rem;font-size:19px;color:#1f2328">❤️ ${t.favs}</h2>
  ${list.length===0?`<div class="empty"><div class="empty-em">🤍</div><p>${t.fave}</p></div>`:`<div class="grid">${list.map(p=>renderCard(p)).join("")}</div>`}
  </div>`;
}

  </div></div>
  <div class="cfg-section"><div class="cfg-label">🎨 ${t.thm}</div><div class="theme-row">

  </div>
  </div></div>`;

function renderLogin(){
  const t=T[S.lang];
  return`<div class="login-wrap" dir="${t.dir}"><div class="login-box">
  <div class="login-center"><div class="login-em">🏘️</div><h2 class="login-h2">${t.app}</h2><p class="login-p">${S.lstp===1?"أدخل رقم هاتفك":"أدخل رمز التحقق"}</p></div>
  ${S.lstp===1?`
    <label>${t.ph}</label>
    <input class="inp" id="l-ph" type="tel" value="${S.ph}" oninput="setState({ph:this.value})" placeholder="0555 000 000" style="text-align:center;font-size:16px;letter-spacing:2px;margin-bottom:14px"/>
    <button class="btn-primary" style="width:100%;border:none;font-family:inherit;margin-bottom:0" onclick="if(S.ph.length>=9)setState({lstp:2})">${t.nxt}</button>
  `:`
    <div class="otp-hint">رمز التجربة: <b>1234</b></div>
    <input class="inp" id="l-otp" type="number" value="${S.otp}" oninput="setState({otp:this.value})" placeholder="0 0 0 0" maxlength="4" style="text-align:center;font-size:24px;letter-spacing:8px;margin-bottom:14px"/>

    <button class="btn-secondary" style="width:100%;font-family:inherit" onclick="setState({lstp:1})">${t.prv}</button>
  `}
  <button class="back-link" onclick="setState({showL:false,lstp:1})">${t.back}</button>
  </div></div>`;
}

// ACTIONS
function setLang(l){setState({lang:l});}
function toggleDark(){setState({dark:!S.dark});}
function setTab(id){setState({tab:id,sel:null,done:false,stp:1});}
function togFav(id){setState(s=>({favs:s.favs.includes(id)?s.favs.filter(x=>x!==id):[...s.favs,id]}));}
function selectProp(id){setState({sel:P.find(p=>p.id===id),msgOk:false,msg:""});}
function setForm(k,v){setState(s=>({form:{...s.form,[k]:v}}));}
function sendMsg(){const ta=document.getElementById("msg-ta");if(ta&&ta.value.trim())setState({msgOk:true,msg:ta.value});}
function checkOtp(){if(S.otp==="1234")setState({user:{name:"سيدي شهاب",ph:S.ph},showL:false,lstp:1,otp:""});}
