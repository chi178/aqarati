<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#15803d"/>
<title>عقاراتي | Aqarati</title>
<style>
/* --- التصميم العصري والمتغيرات (Light & Dark Mode) --- */
:root {
  --bg-main: #f3f4f6;
  --bg-card: #ffffff;
  --text-main: #111827;
  --text-muted: #6b7280;
  --primary: #15803d;
  --primary-hover: #166534;
  --nav-bg: rgba(255, 255, 255, 0.85);
  --border: #e5e7eb;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
}

[data-theme="dark"] {
  --bg-main: #121212;
  --bg-card: #1e1e1e;
  --text-main: #f9fafb;
  --text-muted: #9ca3af;
  --primary: #22c55e;
  --primary-hover: #16a34a;
  --nav-bg: rgba(30, 30, 30, 0.85);
  --border: #374151;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-main); color: var(--text-main); overflow-x: hidden; }

/* شاشة التحميل */
#splash { position: fixed; inset: 0; background: linear-gradient(135deg, #0f5132, #15803d); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
.splash-logo { font-size: 40px; color: #fff; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px; }
.loader { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: sp 1s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

/* هيكل الصفحات */
.page { display: none; min-height: 100vh; padding-bottom: 90px; }
.page.active { display: block; }
.container { padding: 16px; max-width: 600px; margin: 0 auto; }

/* الهيدر العلوي */
header { background: var(--bg-card); padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.brand { font-size: 22px; font-weight: 800; color: var(--primary); }
.lang-box { display: flex; background: var(--bg-main); border-radius: 8px; padding: 4px; gap: 4px; }
.lang-btn { background: transparent; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
.lang-btn.on { background: var(--primary); color: #fff; }
.search-bar { background: var(--bg-main); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
.search-bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--text-main); font-size: 14px; }

/* الشريط السفلي (Navigation) المزود بـ SVGs */
#nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: var(--nav-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; padding: 10px 8px 16px; }
.nav-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; }
.nav-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
.nav-btn.on { color: var(--primary); }

/* البطاقات (Cards) */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 16px; }
.card { background: var(--bg-card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; }
.card-img { height: 160px; background-size: cover; background-position: center; background-color: var(--border); position: relative; }
.card-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); color: #fff; padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 8px; }
.card-body { padding: 16px; }
.card-loc { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.card-tit { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; line-height: 1.4; }
.card-price { font-size: 18px; font-weight: 900; color: var(--primary); }

/* الحقول والأزرار */
.input-box { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-size: 14px; background: var(--bg-main); color: var(--text-main); margin-bottom: 16px; outline: none; }
.input-box:focus { border-color: var(--primary); }
.btn { width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: bold; cursor: pointer; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

/* أدوات التصفية */
.filter-tabs { display: flex; background: var(--bg-card); border-radius: 12px; padding: 6px; margin-bottom: 12px; border: 1px solid var(--border); }
.filter-tab { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); border-radius: 8px; cursor: pointer; }
.filter-tab.on { background: var(--bg-main); color: var(--primary); }

/* صفحة الإعدادات والملف الشخصي */
.profile-card { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); border-radius: var(--radius); padding: 24px; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
.profile-av { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cfg-box { background: var(--bg-card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }

/* رفع الصور */
.img-upload { border: 2px dashed var(--border); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 16px; background: var(--bg-main); }
.img-upload img { max-width: 100%; border-radius: 8px; margin-top: 12px; display: none; }

/* التنبيهات */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg-card); padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: bold; z-index: 9999; opacity: 0; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

  <div class="splash-logo">AQARATI</div>

</div>

  <div class="search-bar" id="search-bar">

  <button class="nav-btn" onclick="navGo('favs')">

    <span id="nav-cfg">الإعدادات</span>
  </button>
</div>

<div id="browse-page" class="page active">
  <div class="container">
    <div class="filter-tabs">
      <div class="filter-tab on" id="ft-all" onclick="setFType('all')">الكل</div>
      <div class="filter-tab" id="ft-rent" onclick="setFType('rent')">إيجار</div>

    <div style="margin-top:20px; margin-bottom:10px; font-weight:bold; color:var(--text-muted)" id="lbl-listings">آخر العقارات</div>

  </div>
</div>

<div id="post-page" class="page">

</div>
