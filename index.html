function t(){return TL[S.lang]}
function fmt(p,type){return p.toLocaleString("fr-DZ")+" "+t().pu+(type==="rent"?t().pm:"")}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3000)}

async function loadProps(){
  if(!window._dbReady)return;
  try{
    const snap=await window._get(window._q(window._col(window._db,"properties"),window._ord("createdAt","desc")));
    S.props=snap.docs.map(d=>({id:d.id,...d.data()}));
    S.loading=false;
    re();
  }catch(e){S.loading=false;re();}
}

async function saveAd(){
  if(!window._dbReady){toast("قاعدة البيانات غير جاهزة");return;}
  S.saving=true;re();
  try{
    const f=S.form;
    await window._add(window._col(window._db,"properties"),{
      type:f.type,cat:f.cat,wil:f.wil,city:f.com,rooms:Number(f.rm),area:Number(f.ar),floor:0,
      price:Number(f.pr),em:CE[f.cat],
      title:{ar:f.ttl,fr:f.ttl,en:f.ttl},
      desc:{ar:f.dsc,fr:f.dsc,en:f.dsc},
      phone:f.ph,owner:S.user?S.user.name:"مستخدم",
      feat:false,ok:false,neg:f.neg,
      createdAt:window._ts()
    });
    S.saving=false;S.done=true;
    await loadProps();
    re();
    toast("✅ تم نشر إعلانك!");
  }catch(e){S.saving=false;toast("حدث خطأ، حاول مرة أخرى");re();}
}

function re(){
  const app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=render();
}

function render(){
  const tk=t();
  if(S.showL)return renderLogin();
  if(S.sel&&S.tab==="browse")return renderDetail();
  return`<div dir="${tk.dir}">
    ${renderHeader()}
    <main>${renderTab()}</main>
    ${renderNav()}
    ${S.saving?`<div class="loading-overlay"><div class="loading-box"><div class="loader" style="border-top-color:#116329;border-color:rgba(17,99,41,.2)"></div><p>${tk.saving}</p></div></div>`:""}
  </div>`;
}

function renderNav(){

  return`<div id="nav">${[["browse","🏠",tk.browse],["post","➕",tk.post],["favs","❤️",tk.favs],["cfg","⚙️",tk.cfg]].map(([id,em,lb])=>`<button class="nb${S.tab===id?" on":""}" onclick="setTab('${id}')"><span class="ne">${em}</span>${lb}</button>`).join("")}</div>`;

function renderTab(){
  if(S.tab==="browse")return renderBrowse();
  if(S.tab==="post")return renderPost();
  if(S.tab==="favs")return renderFavs();
  if(S.tab==="cfg")return renderCfg();
  return"";
}

function getList(){
  return S.props.filter(p=>{
    if(S.fT!=="all"&&p.type!==S.fT)return false;
    if(S.fW!=="all"&&p.wil!==S.fW)return false;
    if(S.fC!=="all"&&p.cat!==S.fC)return false;
    if(S.minP&&p.price<Number(S.minP))return false;
    if(S.maxP&&p.price>Number(S.maxP))return false;
    if(S.q&&!p.title[S.lang].toLowerCase().includes(S.q.toLowerCase())&&!p.wil.includes(S.q)&&!p.city.includes(S.q))return false;
    return true;
  });
}
